<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ทะเบียนใบสั่งซื้อ — PO Tracker</title>
<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Thai", "Sarabun", sans-serif;
    --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --border-radius-lg: 12px;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: #F7F5F1;
    font-family: var(--font-sans);
  }
  #root { max-width: 1200px; margin: 0 auto; padding: 20px; }
  #storage-banner {
    max-width: 1200px;
    margin: 12px auto 0;
    padding: 10px 16px;
    background: #FFF3DA;
    border: 1px solid #F2D9A0;
    color: #7A5A0E;
    border-radius: 8px;
    font-size: 12.5px;
    font-family: var(--font-sans);
  }
.ti { font-style: normal; display: inline-block; line-height: 1; }
.ti-upload::before { content: "\2b06\fe0f"; }
.ti-plus::before { content: "+"; font-weight: 700; }
.ti-chart-bar::before { content: "\1f4ca"; }
.ti-list::before { content: "\1f4cb"; }
.ti-calendar::before { content: "\1f4c5"; }
.ti-shopping-cart::before { content: "\1f6d2"; }
.ti-presentation::before { content: "\1f4c8"; }
.ti-file-invoice::before { content: "\1f9fe"; }
.ti-edit::before { content: "\270f\fe0f"; }
.ti-trash::before { content: "\1f5d1\fe0f"; }
.ti-check::before { content: "\2713"; font-weight: 700; }
.ti-x::before { content: "\2715"; }
.ti-sort-descending::before { content: "\2193"; font-weight: 700; }
.ti-sort-ascending::before { content: "\2191"; font-weight: 700; }
.ti-info-circle::before { content: "\2139\fe0f"; }
.ti-package::before { content: "\1f4e6"; }
.ti-clock::before { content: "\1f550"; }
.ti-calendar-time::before { content: "\1f5d3\fe0f"; }
.ti-building::before { content: "\1f3e2"; }
.ti-phone::before { content: "\1f4de"; }
.ti-mail::before { content: "\2709\fe0f"; }
.ti-map-pin::before { content: "\1f4cd"; }
.ti-notes::before { content: "\1f4dd"; }
</style>
</head>
<body>
<div id="storage-banner">
  หมายเหตุ: ไฟล์นี้เชื่อมต่อกับ Firebase (Firestore) เพื่อบันทึกข้อมูลถาวรและใช้ร่วมกันทั้งทีม — ก่อนใช้งานจริง ต้องแก้ค่า <code>firebaseConfig</code> ในซอร์สโค้ดให้เป็นของโปรเจกต์ Firebase ของคุณ และเปิดใช้ Firestore + Anonymous sign-in ใน Firebase Console ก่อน (ดูคอมเมนต์ในโค้ด)
</div>
<div id="root"></div>

// The catalog above is only the *fallback* used the first time the app ever runs.
// The real, editable catalog is loaded from storage into this mutable variable and
// kept in sync by CatalogManagerView. Anything that reads ORDER_ITEMS_DATA (the PO
// form's autocomplete, the order-items tracking table, etc.) always sees the latest
// saved list because it re-reads this variable on every render.
let ORDER_ITEMS_DATA = DEFAULT_ORDER_ITEMS_DATA;
let __catalogListeners = [];
function setGlobalCatalog(items) {
  ORDER_ITEMS_DATA = items;
  __catalogListeners.forEach(fn => {
    try {
      fn();
    } catch (e) {}
  });
}
function subscribeCatalog(fn) {
  __catalogListeners.push(fn);
  return () => {
    __catalogListeners = __catalogListeners.filter(f => f !== fn);
  };
}

function OrderItemsView({
  pos,
  onViewPo
}) {
  const [poState, setPoState] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [typeFilter, setTypeFilter] = useState("all");
  const [poFilter, setPoFilter] = useState("all");
  const [search, setSearch] = useState("");

  // Document (เอกสาร) grouping — lets the user bundle a subset of catalog items under a
  // document number. Clicking a document opens straight into that document's purchase list.
  const [docs, setDocs] = useState([]);
  const [docsLoading, setDocsLoading] = useState(true);
  const [docsSaving, setDocsSaving] = useState(false);
  const [oiMode, setOiMode] = useState("docs"); // "docs" | "all" | "doc"
  const [activeDocId, setActiveDocId] = useState(null);
  const [showDocForm, setShowDocForm] = useState(false);
  const [docDraft, setDocDraft] = useState(emptyDocDraft());
  const [docSearch, setDocSearch] = useState("");
  const [pickerSearch, setPickerSearch] = useState("");
  const [pickerType, setPickerType] = useState("all");

  // Catalog management — the editable product list + this month's order quantities,
  // plus a history of past months' snapshots for comparison.
  const [catalogItems, setCatalogItems] = useState(DEFAULT_ORDER_ITEMS_DATA);
  const [catalogMonth, setCatalogMonth] = useState("");
  const [catalogUpdatedAt, setCatalogUpdatedAt] = useState(null);
  const [catalogLoading, setCatalogLoading] = useState(true);
  const [catalogSaving, setCatalogSaving] = useState(false);
  const [catalogHistory, setCatalogHistory] = useState([]);
  const [catalogHistoryLoading, setCatalogHistoryLoading] = useState(true);
  const catalogFileInputRef = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get("order-items-po", true);
        if (res && res.value) setPoState(JSON.parse(res.value));
      } catch (e) {}
      setLoading(false);
    })();
    (async () => {
      try {
        const res = await window.storage.get("requisition-docs", true);
        if (res && res.value) setDocs(JSON.parse(res.value));
      } catch (e) {}
      setDocsLoading(false);
    })();
    (async () => {
      try {
        const res = await window.storage.get("order-items-catalog", true);
        if (res && res.value) {
          const parsed = JSON.parse(res.value);
          setCatalogItems(parsed.items && parsed.items.length ? parsed.items : DEFAULT_ORDER_ITEMS_DATA);
          setCatalogMonth(parsed.month || currentMonthLabel());
          setCatalogUpdatedAt(parsed.updatedAt || null);
        } else {
          setCatalogItems(DEFAULT_ORDER_ITEMS_DATA);
          setCatalogMonth(currentMonthLabel());
        }
      } catch (e) {
        setCatalogItems(DEFAULT_ORDER_ITEMS_DATA);
        setCatalogMonth(currentMonthLabel());
      }
      setCatalogLoading(false);
    })();
    (async () => {
      try {
        const res = await window.storage.get("order-items-catalog-history", true);
        if (res && res.value) setCatalogHistory(JSON.parse(res.value));
      } catch (e) {}
      setCatalogHistoryLoading(false);
    })();
  }, []);

  async function persistCatalog(items, month) {
    const nowIso = new Date().toISOString();
    setCatalogItems(items);
    setCatalogMonth(month);
    setCatalogUpdatedAt(nowIso);
    setCatalogSaving(true);
    try {
      await window.storage.set("order-items-catalog", JSON.stringify({
        items,
        month,
        updatedAt: nowIso
      }), true);
    } catch (e) {}
    setGlobalCatalog(items);
    setCatalogSaving(false);
  }
  async function persistCatalogHistory(next) {
    setCatalogHistory(next);
    try {
      await window.storage.set("order-items-catalog-history", JSON.stringify(next), true);
    } catch (e) {}
  }
  async function snapshotCurrentCatalogToHistory() {
    if (!catalogItems || catalogItems.length === 0) return;
    const snap = {
      id: uid("snap"),
      month: catalogMonth || currentMonthLabel(),
      items: catalogItems,
      savedAt: new Date().toISOString()
    };
    await persistCatalogHistory([snap, ...catalogHistory]);
  }
  function addCatalogItem() {
    const blank = {
      id: uid("item"),
      code: "",
      name: "",
      type: "วัตถุดิบ",
      order_qty: 0,
      unit: "",
      supplier: ""
    };
    persistCatalog([blank, ...catalogItems], catalogMonth);
  }
  function updateCatalogItem(id, field, value) {
    const next = catalogItems.map(it => it.id === id ? {
      ...it,
      [field]: field === "order_qty" ? Number(value) || 0 : value
    } : it);
    persistCatalog(next, catalogMonth);
  }
  function deleteCatalogItem(id) {
    if (!window.confirm("ลบสินค้ารายการนี้ออกจากรายการที่ต้องสั่งซื้อ?")) return;
    persistCatalog(catalogItems.filter(it => it.id !== id), catalogMonth);
  }
  async function startNewCatalogMonth() {
    const suggested = currentMonthLabel();
    const label = window.prompt("ตั้งชื่อรอบเดือนใหม่ (รายการปัจจุบันจะถูกเก็บไว้ในประวัติก่อนเปลี่ยน):", suggested);
    if (label === null) return;
    await snapshotCurrentCatalogToHistory();
    await persistCatalog(catalogItems, label.trim() || suggested);
    showCatalogToast("เริ่มรอบเดือนใหม่แล้ว — แก้ไขจำนวนที่ต้องสั่งซื้อได้เลย");
  }
  function importCatalogCsv(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const text = ev.target.result;
        const rows = parseCsvGeneric(text);
        if (rows.length < 2) {
          window.alert("ไฟล์ไม่มีข้อมูล");
          return;
        }
        const header = rows[0].map(h => h.trim().toLowerCase());
        const idx = {
          code: header.findIndex(h => h.includes("code") || h.includes("รหัส")),
          name: header.findIndex(h => h.includes("name") || h.includes("สินค้า") || h.includes("ชื่อ")),
          type: header.findIndex(h => h.includes("type") || h.includes("ประเภท")),
          qty: header.findIndex(h => h.includes("qty") || h.includes("จำนวน")),
          unit: header.findIndex(h => h.includes("unit") || h.includes("หน่วย")),
          supplier: header.findIndex(h => h.includes("supplier") || h.includes("vendor") || h.includes("ผู้ขาย"))
        };
        if (idx.name === -1 || idx.qty === -1) {
          window.alert("ไฟล์ต้องมีคอลัมน์อย่างน้อย: Name (ชื่อสินค้า) และ OrderQty (จำนวนที่ต้องสั่งซื้อ)");
          return;
        }
        const items = [];
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          if (!r || r.every(c => !c || !c.trim())) continue;
          const name = (r[idx.name] || "").trim();
          if (!name) continue;
          const code = idx.code !== -1 ? (r[idx.code] || "").trim() : "";
          items.push({
            id: code || uid("item"),
            code,
            name,
            type: idx.type !== -1 ? (r[idx.type] || "").trim() : "",
            order_qty: Number(r[idx.qty]) || 0,
            unit: idx.unit !== -1 ? (r[idx.unit] || "").trim() : "",
            supplier: idx.supplier !== -1 ? (r[idx.supplier] || "").trim() : ""
          });
